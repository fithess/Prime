<style>
  :root{
    --bg:#10141A; --surface:#1B222B; --surface-alt:#232C37; --line:#2C3644;
    --text:#EDEFF2; --muted:#8B95A1; --gold:#E3A83B; --gold-dim:#8A6A2A; --teal:#37C6A0; --red:#E0654F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  .display{font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .mono{font-family:'SF Mono','Consolas','Menlo','Courier New',monospace;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;padding:20px 16px 100px;}
  button{font:inherit;border:none;background:none;color:inherit;cursor:pointer;}
  input{font:inherit;color:var(--text);background:var(--surface-alt);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;width:100%;}
  input:focus{outline:1px solid var(--gold);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .pill{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700;letter-spacing:.5px;display:inline-block;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;}
  .gap6{gap:6px;} .gap8{gap:8px;} .gap10{gap:10px;} .gap14{gap:14px;}
  .col{display:flex;flex-direction:column;}
  .muted{color:var(--muted);font-size:13px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .btn-primary{background:var(--gold);color:#14171C;font-weight:700;border-radius:12px;padding:14px;text-align:center;}
  .btn-secondary{background:var(--surface-alt);color:var(--text);font-weight:700;border-radius:12px;padding:14px;text-align:center;}
  .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);font-weight:700;border-radius:8px;padding:6px 10px;font-size:12px;}
  .bar-bg{height:8px;background:var(--surface-alt);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;transition:width .3s;}
  .navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;}
  .navbtn .ic{font-size:19px;}
  .navbtn .lb{font-size:10px;font-weight:600;}
  .fade{animation:fadeUp .25s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideHoriz{0%,100%{transform:translateX(-26px);}50%{transform:translateX(26px);}}
  @keyframes slideVert{0%,100%{transform:translateY(28px);}50%{transform:translateY(-28px);}}
  @keyframes rotateSwing{0%,100%{transform:rotate(-22deg);}50%{transform:rotate(22deg);}}
  @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(227,168,59,.45);}50%{box-shadow:0 0 0 12px rgba(227,168,59,0);}}
  .diagram{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
  .diagram-box{border:2px dashed var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .diagram-box.horiz{width:150px;height:64px;}
  .diagram-box.vert{width:64px;height:140px;}
  .diagram-figure{font-size:26px;}
  .slide-horiz{animation:slideHoriz 1.8s ease-in-out infinite;}
  .slide-vert{animation:slideVert 1.8s ease-in-out infinite;}
  .rotate-swing{animation:rotateSwing 1.8s ease-in-out infinite;transform-origin:center bottom;}
  .pulse-circle{width:66px;height:66px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;
    justify-content:center;font-size:28px;animation:pulseRing 1.8s ease-in-out infinite;}
  .diagram-label{font-size:11px;color:var(--muted);text-align:center;}
  .steps{display:flex;flex-direction:column;gap:10px;margin:8px 0 0;padding:0;list-style:none;}
  .steps li{display:flex;gap:10px;align-items:flex-start;}
  .stepnum{min-width:22px;height:22px;border-radius:6px;background:var(--surface-alt);color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .badge-tile{background:var(--surface-alt);border-radius:10px;padding:12px 6px;text-align:center;}
  .dot{width:6px;height:6px;border-radius:999px;background:var(--line);}
  .dot.on{background:var(--gold);}
  .daygrid{display:grid;grid-template-columns:repeat(14,1fr);gap:4px;}
  .daycell{aspect-ratio:1;border-radius:4px;background:var(--surface-alt);}
  .daycell.on{background:var(--gold);}
  a{color:inherit;}
</style>
</head>

function normalizeText(s){ return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function searchFood(query){
  const q = normalizeText(query).trim();
  if (!q) return [];
  const rawWords = q.split(/\s+/).filter(Boolean);
  const words = [];
  rawWords.forEach(w=>{ words.push(w); if (w.length>3 && w.endsWith("s")) words.push(w.slice(0,-1)); });
  const scored = FOOD_DB.map(item=>{
    const hay = normalizeText(item.name+" "+item.alias.join(" "));
    let score = 0;
    words.forEach(w=>{ if (hay.includes(w)) score++; else if (w.length>4 && [...hay.split(/[\s,]+/)].some(h=>h.startsWith(w.slice(0,4)))) score+=0.5; });
    return {item, score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return scored.slice(0,6).map(x=>x.item);
}

// One-time migration: shift an already-saved schedule to the new Tuesday-start
// template (Monday becomes rest), keeping any exercises the user had swapped in.
(function migrateSchedule(){
  if (localStorage.getItem(SCHEDULE_MIGRATION_KEY)) return;
  const byId = {};
  STATE.program.days.forEach(d=>{ byId[d.id] = d; });
  const migrated = SCHEDULE_V2_ORDER.map(id=>{
    const day = byId[id];
    if (!day) return null;
    return {...day, weekday: SCHEDULE_V2_WEEKDAYS[id]};
  }).filter(Boolean);
  if (migrated.length === STATE.program.days.length){
    STATE.program = {...STATE.program, days: migrated};
    save(LS.program, STATE.program);
  }
  localStorage.setItem(SCHEDULE_MIGRATION_KEY, "1");
})();

// One-time migration: swap Thursday and Friday (recurring Thursday medical appointment).
(function migrateThuFriSwap(){
  if (localStorage.getItem(SCHEDULE_MIGRATION_KEY_V3)) return;
  const days = STATE.program.days;
  const thu = days.find(d=>d.weekday==="Jeudi");
  const fri = days.find(d=>d.weekday==="Vendredi");
  if (thu && fri){
    thu.weekday = "Vendredi";
    fri.weekday = "Jeudi";
    STATE.program = {...STATE.program, days:[...days]};
    save(LS.program, STATE.program);
  }
  localStorage.setItem(SCHEDULE_MIGRATION_KEY_V3, "1");
})();

function localDateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const todayStr = () => localDateStr(new Date());
const fmtDate = d => new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
const fmtWeekday = d => new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long"});
const addDays = (d,n) => { const x=new Date(d+"T00:00:00"); x.setDate(x.getDate()+n); return localDateStr(x); };
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toNum(v){ if (v===null||v===undefined||v==="") return NaN; return parseFloat(String(v).replace(",",".")); }

function slotForDate(dateStr){
  const overrideId = STATE.weekOverrides[dateStr];
  if (overrideId){
    const overridden = STATE.program.days.find(d => d.id === overrideId);
    if (overridden) return overridden;
  }
  const wd = fmtWeekday(dateStr).toLowerCase();
  return STATE.program.days.find(d => d.weekday.toLowerCase() === wd) || null;
}

function swapDays(dateA, dateB){
  const dayA = slotForDate(dateA);
  const dayB = slotForDate(dateB);
  if (!dayA || !dayB) return;
  STATE.weekOverrides = {...STATE.weekOverrides, [dateA]: dayB.id, [dateB]: dayA.id};
  save(LS.weekOverrides, STATE.weekOverrides);
}
function clearSwap(dateStr){
  const next = {...STATE.weekOverrides};
  delete next[dateStr];
  STATE.weekOverrides = next;
  save(LS.weekOverrides, STATE.weekOverrides);
}

function weekIndexFor(dateStr){
  const epoch = new Date("2026-01-05T00:00:00"); // a Monday reference
  const d = new Date(dateStr+"T00:00:00");
  return Math.floor((d - epoch) / (7*86400000));
}
function weeklyExercises(baseIds, dateStr){
  const wk = weekIndexFor(dateStr);
  if (wk % 2 === 0) return baseIds;
  return baseIds.map(id => (EX[id] && EX[id].alt && EX[id].alt[0]) ? EX[id].alt[0] : id);
}

function calcStreak(activeDates){
  const set = new Set(activeDates);
  let cursor = new Date();
  const fmt = d => localDateStr(d);
  if (!set.has(fmt(cursor))){ cursor.setDate(cursor.getDate()-1); if(!set.has(fmt(cursor))) return 0; }
  let streak=0;
  while(set.has(fmt(cursor))){ streak++; cursor.setDate(cursor.getDate()-1); }
  return streak;
}

function earnedPoints(){
  const sessionPts = STATE.sessions.reduce((a,s)=>a+(s.type==="muscu"?40:25),0);
  const dailyPts = Object.values(STATE.daily).reduce((a,v)=>a+(v.weight?5:0)+(v.sleep?5:0)+(v.water>=WATER_TARGET?5:0),0);
  return sessionPts + dailyPts;
}
function spentPoints(){ return STATE.redeemLog.reduce((a,r)=>a+r.cost,0); }
function balance(){ return earnedPoints() - spentPoints(); }
function currentStreak(){
  const dates = [...STATE.sessions.map(s=>s.date), ...Object.entries(STATE.daily).filter(([,v])=>v.water||v.weight||v.sleep||(v.meals&&v.meals.length)).map(([d])=>d)];
  return calcStreak(dates);
}
function prCount(){
  const best = {};
  let count = 0;
  const chrono = [...STATE.sessions].filter(s=>s.type==="muscu").sort((a,b)=>a.date>b.date?1:-1);
  chrono.forEach(s=>{
    s.entries.forEach(e=>{
      const maxW = Math.max(0, ...e.sets.map(x=>toNum(x.weight)||0));
      if (maxW>0 && maxW > (best[e.exId]||0)){ best[e.exId]=maxW; count++; }
    });
  });
  return count;
}
function personalRecords(){
  const best = {};
  STATE.sessions.filter(s=>s.type==="muscu").forEach(s=>{
    s.entries.forEach(e=>{
      const maxW = Math.max(0, ...e.sets.map(x=>toNum(x.weight)||0));
      if (maxW>0 && (!best[e.exId] || maxW>best[e.exId].weight)) best[e.exId] = {weight:maxW, date:s.date};
    });
  });
  return best;
}
function badgeCtx(){ return {sessions:STATE.sessions, streak:currentStreak(), daily:STATE.daily, prCount:prCount()}; }

function mealKcal(raw){ const m = typeof raw==="string" ? {kcal:null} : raw; return m.kcal || 0; }
function dayKcalTotal(entry){ return (entry.meals||[]).reduce((a,raw)=>a+mealKcal(raw),0); }

function exerciseHistory(exId){
  return STATE.sessions.filter(s=>s.type==="muscu").flatMap(s=>{
    const e = s.entries.find(en=>en.exId===exId);
    return e ? [{date:s.date, sets:e.sets}] : [];
  }).sort((a,b)=> a.date<b.date?1:-1);
}
function suggestedTarget(exId){
  const base = DEFAULT_TARGET[exId] || {sets:3, reps:12};
  const unit = base.unit==="sec" ? "sec" : "reps";
  const history = exerciseHistory(exId);
  if (history.length===0) return {sets:base.sets, reps:base.reps, unit, weight:null, note:"Premier passage sur cet exo — commence léger, priorise la forme correcte."};
  const validSets = (history[0].sets||[]).filter(s=>s.reps!=="");
  if (validSets.length===0) return {sets:base.sets, reps:base.reps, unit, weight:null, note:"Reprends là où tu en étais la dernière fois."};
  const avgReps = validSets.reduce((a,s)=>a+(toNum(s.reps)||0),0)/validSets.length;
  const maxWeight = Math.max(...validSets.map(s=>toNum(s.weight)||0));
  if (avgReps >= base.reps){
    const nextWeight = maxWeight>0 ? Math.round((maxWeight+2.5)*2)/2 : null;
    return {sets:validSets.length, reps:base.reps, unit, weight:nextWeight,
      note: nextWeight ? `Objectif atteint la dernière fois — essaie ${nextWeight}kg (+2.5kg), ou +1-2 ${unit==="sec"?"sec":"reps"} si tu préfères garder le même poids.` : `Objectif atteint la dernière fois — ajoute 1-2 ${unit==="sec"?"sec":"reps"} si tu peux.`};
  }
  return {sets:validSets.length, reps:base.reps, unit, weight:maxWeight||null,
    note:`Reste sur ce poids cette fois, priorité à compléter toutes les ${unit==="sec"?"secondes":"reps"}.`};
}

function muscleVolumeLast7(){
  const cutoff = addDays(todayStr(), -6);
  const vol = {};
  STATE.sessions.filter(s=>s.type==="muscu" && s.date>=cutoff).forEach(s=>{
    s.entries.forEach(e=>{
      const muscle = (EX[e.exId]||{}).muscle || "Autre";
      const sum = e.sets.reduce((a,x)=>a+(toNum(x.weight)||0)*(toNum(x.reps)||0),0);
      vol[muscle] = (vol[muscle]||0) + sum;
    });
  });
  return vol;
}
function weekAverages(){
  const cutoff = addDays(todayStr(), -6);
  const entries = Object.entries(STATE.daily).filter(([d])=>d>=cutoff).map(([,v])=>v);
  const avg = key => { const vals = entries.map(v=>v[key]).filter(v=>v!=null && v!=="" && !isNaN(v)); return vals.length ? vals.reduce((a,b)=>a+toNum(b),0)/vals.length : null; };
  const kcalVals = entries.map(dayKcalTotal).filter(k=>k>0);
  return {sleep:avg("sleep"), water:avg("water"), kcal: kcalVals.length ? kcalVals.reduce((a,b)=>a+b,0)/kcalVals.length : null};
}
function weightTrend(){
  const entries = Object.entries(STATE.daily).filter(([,v])=>v.weight).sort((a,b)=>a[0]<b[0]?-1:1);
  if (entries.length<2) return null;
  const first = entries[0], last = entries[entries.length-1];
  const days = (new Date(last[0]+"T00:00:00") - new Date(first[0]+"T00:00:00")) / 86400000;
  if (days<=0) return null;
  return {current:last[1].weight, start:first[1].weight, rate:(first[1].weight-last[1].weight)/days};
}

function weeklySummary(){
  const cutoff = addDays(todayStr(), -6);
  const sessionsWeek = STATE.sessions.filter(s=>s.date>=cutoff);
  const muscuCount = sessionsWeek.filter(s=>s.type==="muscu").length;
  const cardioCount = sessionsWeek.filter(s=>s.type==="cardio").length;
  const weights = Object.entries(STATE.daily).filter(([,v])=>v.weight).sort();
  let weightDelta = null;
  if (weights.length){
    const latest = weights[weights.length-1];
    const weekAgoEntry = weights.find(([d])=>d>=cutoff);
    if (weekAgoEntry && weekAgoEntry[0]!==latest[0]) weightDelta = latest[1].weight - weekAgoEntry[1].weight;
  }
  return {muscuCount, cardioCount, weightDelta, avgKcal: weekAverages().kcal};
}

// Rough deficit trend — both sides (mangé / brûlé) are estimates, so this is a
// directional signal only, never treated as an exact number. The scale's
// actual weight change is always the real source of truth, shown alongside it.
// Important: the watch's "calories brûlées" figure is ACTIVE energy only
// (movement/exercise) — it excludes resting/basal metabolism, which is
// usually 60%+ of total daily burn. So total burn = BMR + active (watch).
function computeBMR(weightKg, profile){
  if (!profile || !profile.age || !profile.heightCm || !weightKg) return null;
  const age = toNum(profile.age), height = toNum(profile.heightCm);
  if (isNaN(age) || isNaN(height)) return null;
  const sexOffset = profile.sex === "f" ? -161 : 5;
  return 10*weightKg + 6.25*height - 5*age + sexOffset;
}
function weeklyDeficitEstimate(){
  const cutoff = addDays(todayStr(), -6);
  const entries = Object.entries(STATE.daily).filter(([d])=>d>=cutoff).map(([,v])=>v);
  const usable = entries.filter(v => v.watchKcal && dayKcalTotal(v) > 0);
  if (!usable.length) return null;
  const weights = Object.entries(STATE.daily).filter(([,v])=>v.weight).sort();
  const latestWeight = weights.length ? weights[weights.length-1][1].weight : null;
  const bmr = computeBMR(latestWeight, STATE.profile);
  if (!bmr) return {needsProfile:true, days: usable.length};
  const avg = usable.reduce((a,v)=> a + ((bmr + toNum(v.watchKcal)) - dayKcalTotal(v)), 0) / usable.length;
  return {avg: Math.round(avg), low: Math.round(avg*0.85), high: Math.round(avg*1.15), days: usable.length, bmr: Math.round(bmr)};
}

const GOAL_TARGET_DATE = "2026-11-15"; // ~3.5-4 months out, per the stated max timeframe
function monthlyMilestones(){
  const weights = Object.entries(STATE.daily).filter(([,v])=>v.weight).sort();
  if (!weights.length) return [];
  const startW = weights[0][1].weight;
  const startDate = new Date(weights[0][0]+"T00:00:00");
  const targetDate = new Date(GOAL_TARGET_DATE+"T00:00:00");
  const totalDays = (targetDate - startDate) / 86400000;
  if (totalDays <= 0) return [];
  const milestones = [];
  let y = startDate.getFullYear(), m = startDate.getMonth();
  let guard = 0;
  while (guard++ < 12){
    const endOfMonth = new Date(y, m+1, 0);
    if (endOfMonth >= targetDate) break;
    const elapsed = (endOfMonth - startDate)/86400000;
    const frac = Math.max(0, Math.min(1, elapsed/totalDays));
    const w = startW - (startW-GOAL_FINAL)*frac;
    milestones.push({label: endOfMonth.toLocaleDateString("fr-FR",{month:"short"}), weight: Math.round(w*10)/10});
    m++;
  }
  milestones.push({label: targetDate.toLocaleDateString("fr-FR",{month:"short"}), weight: GOAL_FINAL});
  return milestones.slice(0,4);
}

function pill(label, color){ return `<span class="pill" style="background:${color}22;color:${color}">${esc(label)}</span>`; }

function moveDiagram(ex){
  if (ex.axis === "static"){
    return `<div class="diagram"><div class="pulse-circle">🧍</div><p class="diagram-label">${esc(ex.from)}</p></div>`;
  }
  const boxCls = ex.axis === "vertical" ? "diagram-box vert" : "diagram-box horiz";
  const figCls = ex.axis === "rotate" ? "rotate-swing" : (ex.axis === "vertical" ? "slide-vert" : "slide-horiz");
  return `<div class="diagram">
    <div class="${boxCls}"><div class="diagram-figure ${figCls}">🧍</div></div>
    <p class="diagram-label">${esc(ex.from)} <span style="color:var(--gold)">→</span> <span style="color:var(--gold);font-weight:700">${esc(ex.to)}</span></p>
  </div>`;
}

function renderProgram(){
  const todayWd = fmtWeekday(todayStr()).toLowerCase();
  const days = STATE.program.days.map(day=>{
    const meta = TYPE_META[day.type];
    const isOpen = STATE.openProgramDay === day.id;
    const isToday = day.weekday.toLowerCase() === todayWd;
    let inner = "";
    if (day.type==="muscu"){
      const thisWeek = weeklyExercises(day.exercises, todayStr());
      inner = day.exercises.map((eid,idx)=>{
        const displayId = thisWeek[idx];
        const variant = displayId!==eid;
        return `<button class="row between" data-action="open-modal" data-ex="${displayId}" style="background:var(--surface-alt);padding:10px 12px;border-radius:10px;width:100%;text-align:left;">
          <span style="font-size:13px;">${esc(EX[displayId].name)}${variant?' <span style="color:var(--gold);font-size:10px;">🔄 variante cette semaine</span>':""}</span>
          <span class="muted">ⓘ</span>
        </button>`;
      }).join("");
    } else if (day.type==="cardio"){
      inner = `<p class="muted" style="font-size:13px;padding:6px 2px;">Tapis, vélo ou piscine — 25 à 30 min, intensité modérée à soutenue.</p>`;
    } else {
      inner = `<p class="muted" style="font-size:13px;padding:6px 2px;">Repos complet ou piscine/sauna léger si t'en as envie.</p>`;
    }
    return `<div class="card" style="padding:0;overflow:hidden;${isToday?"border-color:var(--gold);background:rgba(227,168,59,.08);":""}">
      <button class="row between" data-action="toggle-day" data-day="${day.id}" style="width:100%;padding:14px;text-align:left;">
        <div><p class="muted" style="font-size:11px;margin:0;">${esc(day.weekday)}${isToday?` <span style="color:var(--gold);font-weight:700;">· AUJOURD'HUI</span>`:""}</p><p style="font-weight:700;font-size:14px;margin:2px 0 6px;">${esc(day.label)}</p>${pill(meta.label,meta.color)}</div>

  return `<div class="col gap10">

function captureCurrentStepInputs(){
  if (!STATE.activeDay || STATE.activeDay.type!=="muscu") return;
  const exId = STATE.activeDay.exercises[STATE.guidedStep];
  const rows = STATE.guidedSets[exId] || [];
  rows.forEach((row,i)=>{
    const w = document.getElementById(`set-w-${i}`), r = document.getElementById(`set-r-${i}`);
    if (w) row.weight = w.value;
    if (r) row.reps = r.value;
  });
}
function captureCardioForm(){
  const d = document.getElementById("cardio-duration"), c = document.getElementById("cardio-calories"), h = document.getElementById("cardio-hr");
  if (d) STATE.cardioForm.duration = d.value;
  if (c) STATE.cardioForm.calories = c.value;
  if (h) STATE.cardioForm.hr = h.value;
}

function startDay(dayId){
  const day = STATE.program.days.find(d=>d.id===dayId);
  if (!day) return;
  const dateStr = todayStr();
  if (day.type==="muscu"){
    const exercises = weeklyExercises(day.exercises, dateStr);
    STATE.activeDay = {...day, exercises};
    STATE.guidedStep = 0;
    STATE.guidedSets = {};
    exercises.forEach(id=>{
      const hist = exerciseHistory(id);
      const lastSets = hist.length ? hist[0].sets.filter(s=>s.reps!=="") : [];
      STATE.guidedSets[id] = lastSets.length
        ? lastSets.map(s=>({weight: s.weight||"", reps:""}))
        : [{weight:"",reps:""},{weight:"",reps:""},{weight:"",reps:""}];
    });
  } else {
    STATE.activeDay = {...day};
    STATE.cardioForm = {activity:"Tapis", duration:"", calories:"", hr:""};
  }
  STATE.tab = "session";
  STATE.justFinished = false;
  render();
}

function finishMuscu(){
  captureCurrentStepInputs();
  const entries = Object.entries(STATE.guidedSets)
    .map(([exId,s])=>({exId, sets:s.filter(x=>x.reps!=="")}))
    .filter(e=>e.sets.length>0);
  if (entries.length===0){ return; }
  const session = {id:Date.now(), date:todayStr(), dayId:STATE.activeDay.id, type:"muscu", entries};
  STATE.sessions = [session, ...STATE.sessions];
  save(LS.sessions, STATE.sessions);
  STATE.activeDay = null; STATE.justFinished = true;
  render();
}
function finishCardio(){
  captureCardioForm();
  if (!STATE.cardioForm.duration) return;
  const session = {id:Date.now(), date:todayStr(), dayId:STATE.activeDay.id, type:"cardio", ...STATE.cardioForm};
  STATE.sessions = [session, ...STATE.sessions];
  save(LS.sessions, STATE.sessions);
  STATE.activeDay = null; STATE.justFinished = true;
  render();
}

function weightChartSVG(){
  const data = Object.entries(STATE.daily).filter(([,v])=>v.weight).sort((a,b)=>a[0]>b[0]?1:-1).map(([d,v])=>({date:fmtDate(d), poids:v.weight}));
  if (data.length<2) return `<p class="muted">Note ton poids au moins 2 jours pour voir le graphique.</p>`;
  const w=300,h=150,pad=26;
  const xs = data.map((_,i)=> pad + i*((w-2*pad)/(data.length-1)));
  const vals = data.map(d=>d.poids);
  const min=Math.min(...vals)-1, max=Math.max(...vals)+1;
  const ys = vals.map(v => h-pad - ((v-min)/(max-min))*(h-2*pad));
  const points = xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const dots = xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3" fill="#E3A83B"/>`).join("");

  // Simple linear regression trend line
  const n = vals.length;
  const sumX = vals.reduce((a,_,i)=>a+i,0);
  const sumY = vals.reduce((a,v)=>a+v,0);
  const sumXY = vals.reduce((a,v,i)=>a+i*v,0);
  const sumXX = vals.reduce((a,_,i)=>a+i*i,0);
  const denom = (n*sumXX - sumX*sumX) || 1;
  const slope = (n*sumXY - sumX*sumY) / denom;
  const intercept = (sumY - slope*sumX) / n;
  const trendYRaw = [0, n-1].map(i => intercept + slope*i);
  const trendY = trendYRaw.map(v => h-pad - ((v-min)/(max-min))*(h-2*pad));
  const trendLine = `<line x1="${xs[0].toFixed(1)}" y1="${trendY[0].toFixed(1)}" x2="${xs[xs.length-1].toFixed(1)}" y2="${trendY[1].toFixed(1)}" stroke="#37C6A0" stroke-width="1.5" stroke-dasharray="4 3"/>`;

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px;">
    ${trendLine}
    <polyline points="${points}" fill="none" stroke="#E3A83B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${pad}" y="${h-4}" fill="#8B95A1" font-size="9">${esc(data[0].date)}</text>
    <text x="${w-pad}" y="${h-4}" fill="#8B95A1" font-size="9" text-anchor="end">${esc(data[data.length-1].date)}</text>
  </svg>
  <p class="muted" style="font-size:11px;margin-top:6px;"><span style="color:#37C6A0;">┄</span> tendance générale</p>`;
}

function copySessionSummary(sessionId){
  const s = STATE.sessions.find(x=>String(x.id)===String(sessionId));
  if (!s) return;
  let text = `Séance du ${fmtDate(s.date)}\n`;
  if (s.type === "muscu"){
    text += "Musculation\n";
    s.entries.forEach(e=>{
      const name = EX[e.exId] ? EX[e.exId].name : e.exId;
      const sets = e.sets.map(x=>`${x.weight||"-"}kg x${x.reps||"-"}`).join(", ");
      text += `- ${name} : ${sets}\n`;
    });
  } else {
    text += `Cardio · ${s.activity||""}\n${s.duration} min${s.calories?` · ${s.calories} kcal`:""}${s.hr?` · FC moy ${s.hr}`:""}\n`;
  }
  const done = () => alert("Résumé copié !");
  const fail = () => alert("Impossible de copier automatiquement, voici le résumé :\n\n"+text);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(fail);
    } else { fail(); }
  } catch(e){ fail(); }
}

function exportData(){
  const data = {
    program: STATE.program, sessions: STATE.sessions, daily: STATE.daily,
    rewards: STATE.rewards, redeemLog: STATE.redeemLog, weekOverrides: STATE.weekOverrides, profile: STATE.profile, exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `fittrack-sauvegarde-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.program) { STATE.program = data.program; save(LS.program, STATE.program); }
      if (data.sessions) { STATE.sessions = data.sessions; save(LS.sessions, STATE.sessions); }
      if (data.daily) { STATE.daily = data.daily; save(LS.daily, STATE.daily); }
      if (data.rewards) { STATE.rewards = data.rewards; save(LS.rewards, STATE.rewards); }
      if (data.redeemLog) { STATE.redeemLog = data.redeemLog; save(LS.redeem, STATE.redeemLog); }
      if (data.weekOverrides) { STATE.weekOverrides = data.weekOverrides; save(LS.weekOverrides, STATE.weekOverrides); }
      if (data.profile) { STATE.profile = data.profile; save(LS.profile, STATE.profile); }
      alert("Sauvegarde restaurée !");
      render();
    } catch(err){
      alert("Fichier invalide, impossible de restaurer.");
    }
  };
  reader.readAsText(file);
}

  if (!btn) return;
  const action = btn.dataset.action;

  if (action==="goto"){ STATE.tab = btn.dataset.tab; STATE.activeDay=null; STATE.justFinished=false; render(); }
  else if (action==="start-day"){ startDay(btn.dataset.day); }
  else if (action==="toggle-swap-picker"){ STATE.swapPickerDate = STATE.swapPickerDate===btn.dataset.date ? null : btn.dataset.date; render(); }
  else if (action==="do-swap"){ swapDays(btn.dataset.dateA, btn.dataset.dateB); STATE.swapPickerDate = null; render(); }
  else if (action==="clear-swap"){ clearSwap(btn.dataset.date); render(); }
  else if (action==="toggle-day"){ STATE.openProgramDay = STATE.openProgramDay===btn.dataset.day ? null : btn.dataset.day; render(); }
  else if (action==="open-modal"){ STATE.modalExId = btn.dataset.ex; render(); }
  else if (action==="close-modal"){ STATE.modalExId = null; render(); }
  else if (action==="swap-ex"){
    const {ctx, old:oldId, new:newId} = btn.dataset;
    if (ctx==="program"){
      const days = STATE.program.days.map(d => d.type!=="muscu" ? d : {...d, exercises:d.exercises.map(e=>e===oldId?newId:e)});
      STATE.program = {...STATE.program, days};
      save(LS.program, STATE.program);
      STATE.modalExId = null;
    } else if (ctx==="session" && STATE.activeDay){
      const idx = STATE.activeDay.exercises.indexOf(oldId);
      if (idx>-1){
        captureCurrentStepInputs();
        STATE.activeDay.exercises[idx] = newId;
        if (!STATE.guidedSets[newId]) STATE.guidedSets[newId] = [{weight:"",reps:""},{weight:"",reps:""},{weight:"",reps:""}];
        const days = STATE.program.days.map(d => d.id!==STATE.activeDay.id ? d : {...d, exercises:d.exercises.map(e=>e===oldId?newId:e)});
        STATE.program = {...STATE.program, days};
        save(LS.program, STATE.program);
      }
    }
    render();
  }
  else if (action==="add-set"){ captureCurrentStepInputs(); const exId=STATE.activeDay.exercises[STATE.guidedStep]; STATE.guidedSets[exId].push({weight:"",reps:""}); render(); }
  else if (action==="next-step"){ captureCurrentStepInputs(); STATE.guidedStep++; render(); }
  else if (action==="prev-step"){ captureCurrentStepInputs(); STATE.guidedStep--; render(); }
  else if (action==="finish-muscu"){ finishMuscu(); }
  else if (action==="finish-cardio"){ finishCardio(); }
  else if (action==="cancel-session"){ STATE.activeDay=null; render(); }
  else if (action==="dismiss-finish"){ STATE.justFinished=false; render(); }
  else if (action==="set-cardio-activity"){ captureCardioForm(); STATE.cardioForm.activity = btn.dataset.value; render(); }
  else if (action==="add-water"){
    const date = todayStr();
    const entry = STATE.daily[date] || {water:0, weight:"", sleep:"", meals:[], watchKcal:""};
    entry.water = Math.max(0, (entry.water||0) + parseInt(btn.dataset.ml,10));
    STATE.daily = {...STATE.daily, [date]: entry};
    save(LS.daily, STATE.daily);
    render();
  }
  else if (action==="add-water-custom"){
    saveWeightSleepFromDOM();
    const inp = document.getElementById("water-custom");
    const ml = inp ? parseInt(inp.value,10) : NaN;
    if (!ml || isNaN(ml)) return;
    const date = todayStr();
    const entry = STATE.daily[date] || {water:0, weight:"", sleep:"", meals:[], watchKcal:""};
    entry.water = Math.max(0, (entry.water||0) + ml);
    STATE.daily = {...STATE.daily, [date]: entry};
    save(LS.daily, STATE.daily);
    render();
  }
  else if (action==="save-field"){ saveWeightSleepFromDOM(); render(); }
  else if (action==="set-profile-sex"){
    const ageEl = document.getElementById("profile-age"), heightEl = document.getElementById("profile-height");
    STATE.profile = {...STATE.profile, age: ageEl?ageEl.value:STATE.profile.age, heightCm: heightEl?heightEl.value:STATE.profile.heightCm, sex: btn.dataset.value};
    save(LS.profile, STATE.profile);
    render();
  }
  else if (action==="save-profile"){
    const ageEl = document.getElementById("profile-age"), heightEl = document.getElementById("profile-height");
    STATE.profile = {...STATE.profile, age: ageEl?ageEl.value:"", heightCm: heightEl?heightEl.value:""};
    save(LS.profile, STATE.profile);
    render();
  }
  else if (action==="toggle-meals-detail"){ saveWeightSleepFromDOM(); STATE.showMealsList = !STATE.showMealsList; render(); }
  else if (action==="set-meal-tag"){ saveWeightSleepFromDOM(); STATE.mealTag = STATE.mealTag===btn.dataset.value ? null : btn.dataset.value; render(); }
  else if (action==="search-food"){
    saveWeightSleepFromDOM();
    const inp = document.getElementById("food-search");
    STATE.foodQuery = inp ? inp.value : "";
    STATE.foodMatches = searchFood(STATE.foodQuery);
    render();
  }
  else if (action==="add-food-match"){
    const item = FOOD_DB.find(f=>f.id===btn.dataset.id);
    if (!item) return;
    const date = todayStr();
    const entry = STATE.daily[date] || {water:0, weight:"", sleep:"", meals:[], watchKcal:""};
    const text = STATE.mealTag ? `${STATE.mealTag} : ${item.name} (${item.portion})` : `${item.name} (${item.portion})`;
    entry.meals = [...(entry.meals||[]), {text, kcal:item.kcal}];
    STATE.daily = {...STATE.daily, [date]: entry};
    save(LS.daily, STATE.daily);
    STATE.mealTag = null; STATE.foodQuery = ""; STATE.foodMatches = [];
    render();
  }
  else if (action==="add-meal"){
    saveWeightSleepFromDOM();
    const input = document.getElementById("input-meal");
    const kcalInput = document.getElementById("input-meal-kcal");
    const text = input ? input.value.trim() : "";
    if (!text) return;
    const kcalNum = kcalInput ? toNum(kcalInput.value) : NaN;
    const kcal = !isNaN(kcalNum) && kcalNum > 0 ? Math.round(kcalNum) : null;
    const date = todayStr();
    const entry = STATE.daily[date] || {water:0, weight:"", sleep:"", meals:[], watchKcal:""};
    const full = STATE.mealTag ? `${STATE.mealTag} : ${text}` : text;
    entry.meals = [...(entry.meals||[]), {text:full, kcal}];
    STATE.daily = {...STATE.daily, [date]: entry};
    save(LS.daily, STATE.daily);
    STATE.mealTag = null;
    render();
  }
  else if (action==="remove-meal"){
    saveWeightSleepFromDOM();
    const date = todayStr();
    const entry = STATE.daily[date];
    if (entry){ entry.meals = entry.meals.filter((_,i)=>i!==parseInt(btn.dataset.idx,10)); STATE.daily={...STATE.daily,[date]:entry}; save(LS.daily, STATE.daily); }
    render();
  }
  else if (action==="add-reward"){
    const l = document.getElementById("reward-label"), c = document.getElementById("reward-cost");
    const label = l ? l.value.trim() : "", cost = c ? parseInt(c.value,10) : 0;
    if (!label || !cost) return;
    STATE.rewards = [...STATE.rewards, {id:"r"+Date.now(), label, cost}];
    save(LS.rewards, STATE.rewards);
    render();
  }
  else if (action==="copy-session"){ copySessionSummary(btn.dataset.id); }
  else if (action==="export-data"){ exportData(); }
  else if (action==="reset-all"){ resetAllData(); }
  else if (action==="trigger-import"){ const inp = document.getElementById("import-file-input"); if (inp) inp.click(); }
  else if (action==="redeem"){
    const reward = STATE.rewards.find(r=>r.id===btn.dataset.id);
    if (!reward || balance()<reward.cost) return;
    STATE.redeemLog = [{...reward, date:todayStr()}, ...STATE.redeemLog];
    save(LS.redeem, STATE.redeemLog);
    render();
  }
});

// save weight/sleep on blur so typing doesn't get lost without needing a save button
document.addEventListener("blur", (e)=>{
  if (e.target && (e.target.id==="input-weight" || e.target.id==="input-sleep" || e.target.id==="input-watch-kcal")) saveWeightSleepFromDOM();
}, true);

document.addEventListener("input", (e)=>{
  if (e.target && e.target.id==="food-search"){
    const val = e.target.value;
    const pos = e.target.selectionStart;
    STATE.foodQuery = val;
    STATE.foodMatches = searchFood(val);
    render();
    const el = document.getElementById("food-search");
    if (el){ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(err){} }
  }
});

document.addEventListener("keydown", (e)=>{
  if (e.key!=="Enter") return;
  if (e.target.id==="input-meal"){ e.preventDefault(); document.querySelector('[data-action="add-meal"]').click(); }
  else if (e.target.id==="food-search"){ e.preventDefault(); document.querySelector('[data-action="search-food"]').click(); }
  else if (e.target.id==="water-custom"){ e.preventDefault(); document.querySelector('[data-action="add-water-custom"]').click(); }
});

document.addEventListener("change", (e)=>{
  if (e.target && e.target.id==="import-file-input" && e.target.files && e.target.files[0]){
    importDataFromFile(e.target.files[0]);
  }
});

render();
</script>
</body>
</html>
